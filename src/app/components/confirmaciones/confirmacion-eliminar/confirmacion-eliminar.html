<mat-dialog-content>
<h2 mat-dialog-title>Eliminar</h2>
    <p>¿Esta seguro de eliminar el elemento?</p>
     
</mat-dialog-content>

<mat-dialog-actions>
    <button matButton (click)="Respuesta(false)">No</button>
    <button matButton="filled" (click)="Respuesta(true)">Si</button>
</mat-dialog-actions>
